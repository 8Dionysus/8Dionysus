interface:
  display_name: AoA Memo Writeback
  short_description: Route session evidence to memo
  default_prompt: Use $aoa-memo-writeback to inspect session evidence, decide whether memo writeback is needed, and route it to a local memo candidate, export packet, or explicit no-writeback stop line.
  icon_small: ./assets/small-logo.svg
  icon_large: ./assets/large-logo.svg
  brand_color: '#2563EB'
policy:
  implicit_activation_policy: suggest
  allow_implicit_invocation: false
