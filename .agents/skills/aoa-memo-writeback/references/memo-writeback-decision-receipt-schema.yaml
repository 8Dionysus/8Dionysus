receipt_name: MEMO_WRITEBACK_DECISION_RECEIPT
event_kind: memo_writeback_decision_receipt
envelope_ref: references/stats-event-envelope.md
required_payload_fields:
  - memo_writeback_decision
  - owner_repo
  - stronger_memory_owner
  - evidence_refs
  - source_refs
  - output_refs
  - validation_refs
optional_payload_fields:
  - local_memo_port_ref
  - reviewed_intake_export_ref
  - no_writeback_reason
  - privacy_risk_markers
  - direct_durable_write
  - requires_reviewed_intake
rules:
  - `memo_writeback_decision` must be one of `write_candidate`, `prepare_export`, `no_writeback_needed`, `route_only_debt`, `needs_owner_review`, or `blocked`
  - `owner_repo` must name the repository whose local memo route owns the candidate or stop line
  - `stronger_memory_owner` must remain `aoa-memo` when durable reviewed memory is desired
  - `evidence_refs` must point to inspectable session, PR, review, receipt, or source evidence instead of pasted raw transcript text
  - `source_refs` must include the owner repo source surfaces that make the claim reviewable
  - `output_refs` must name local candidates, export packets, or the explicit no-writeback stop line
  - `validation_refs` must name the local port, candidate, export, generated index, or live install checks that were run
  - `direct_durable_write` must not be true for local-port candidates
  - `requires_reviewed_intake` must be true when the output is meant to become durable `aoa-memo` memory
