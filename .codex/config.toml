# AoA workspace-scoped Codex config.
# Keep this file narrow: workspace-local markers, hook surfaces, and future MCP wiring.
# Personal defaults belong in ~/.codex/config.toml.

project_root_markers = ["AOA_WORKSPACE_ROOT", ".git"]

[features]
codex_hooks = true

# Installed from /srv/aoa-agents/generated/codex_agents/.
# Keep role meaning in aoa-agents profiles and projection wiring, not here.
[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[agents.architect]
description = "AoA architect. Shapes structure, boundaries, and system-level direction across AoA surfaces."
config_file = "agents/architect.toml"
nickname_candidates = ["Atlas", "Lattice", "Spine"]

[agents.coder]
description = "AoA coder. Implements bounded changes through explicit workflows, verification, and concise reporting."
config_file = "agents/coder.toml"
nickname_candidates = ["Forge", "Rivet", "Patch"]

[agents.evaluator]
description = "AoA evaluator. Applies bounded proof surfaces and comparison discipline to agent-shaped work."
config_file = "agents/evaluator.toml"
nickname_candidates = ["Gauge", "Prism", "Delta"]

[agents.memory-keeper]
description = "AoA memory-keeper. Preserves provenance, recall hygiene, and bounded memory-layer discipline across AoA surfaces."
config_file = "agents/memory-keeper.toml"
nickname_candidates = ["Archive", "Ledger", "Mneme"]

[agents.reviewer]
description = "AoA reviewer. Inspects work for drift, boundedness, review quality, and handoff readiness."
config_file = "agents/reviewer.toml"
nickname_candidates = ["Sentinel", "Lens", "Check"]

# Keep these server names stable if you want the aoa-skills skill-to-MCP
# wiring examples and validators to work unchanged:
# - aoa_workspace
# - aoa_stats
# - dionysus

# Reserved MCP server names for the AoA Codex plane.
[mcp_servers.aoa_workspace]
command = "python3"
args = ["scripts/aoa_workspace_mcp_server.py"]
cwd = "/srv/aoa-sdk"

[mcp_servers.aoa_stats]
command = "python3"
args = ["scripts/aoa_stats_mcp_server.py"]
cwd = "/srv/aoa-stats"

[mcp_servers.dionysus]
command = "python3"
args = ["scripts/dionysus_mcp_server.py"]
cwd = "/srv/Dionysus"
